name: daily-review
on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 10:00 Beijing
  workflow_dispatch:
    inputs:
      reclassify_dates:
        description: "Optional stored dates to reclassify, separated by spaces"
        required: false
        type: string
      regenerate_review_dates:
        description: "Optional stored dates whose news section should be regenerated"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-review
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - name: Reclassify stored days
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reclassify_dates != '' }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GDR_RECLASSIFY_DATES: ${{ inputs.reclassify_dates }}
        run: python scripts/reclassify_days.py $GDR_RECLASSIFY_DATES
      - name: Regenerate stored news sections
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.regenerate_review_dates != '' }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GDR_REVIEW_DATES: ${{ inputs.regenerate_review_dates }}
        run: python scripts/regenerate_reviews.py $GDR_REVIEW_DATES
      - name: Run daily pipeline
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
        run: python scripts/run_daily.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: daily update $(date -u +%F)" || echo "no changes"
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
